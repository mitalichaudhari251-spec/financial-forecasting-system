name: finvision
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11
  - matplotlib>=3.7
  - scikit-learn>=1.3
  - statsmodels>=0.14
  - tqdm

  # PyTorch (CPU — change to pytorch-cuda=11.8 for GPU)
  - pytorch>=2.0
  - torchvision>=0.15
  - cpuonly

  - pip:
    - yfinance>=0.2.28
    - mplfinance>=0.12.10b0
    - pyts>=0.12.0
    - Pillow>=10.0.0
    - gymnasium>=0.29.0
    - stable-baselines3>=2.1.0
    - pytorch-grad-cam>=1.4.8
    - plotly>=5.17.0
    - streamlit>=1.30.0
    - fastapi>=0.104.0
    - uvicorn>=0.24.0
    - mlflow>=2.8.0
    - loguru>=0.7.0
    - python-dotenv>=1.0.0
    - pytest>=7.4.0
    - pytest-cov>=4.1.0